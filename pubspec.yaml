name: nova_ui
description: A modern Flutter UI framework with reusable widgets, design system components, and beautiful developer-friendly APIs.
version: 1.0.5
homepage: https://github.com/flutterbysunny/nova_ui
repository: https://github.com/flutterbysunny/nova_ui
issue_tracker: https://github.com/flutterbysunny/nova_ui/issues
documentation: https://pub.dev/documentation/nova_ui/latest/

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.19.0'

flutter:
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0